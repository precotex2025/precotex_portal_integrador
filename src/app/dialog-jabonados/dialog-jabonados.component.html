<div class="tabla-wrapper">
<table mat-table [dataSource]="dataSource" class="mat-elevation-z2 tabla-ph">

    <!-- SDC -->
    <ng-container matColumnDef="corr_Carta">
      <th mat-header-cell *matHeaderCellDef class="centradoCabecera">#SDC</th>
      <td mat-cell *matCellDef="let r" class="centrado">{{ r.corr_Carta }}</td>
    </ng-container>

    <ng-container matColumnDef="sec">
      <th mat-header-cell *matHeaderCellDef class="centradoCabecera">Secuencia</th>
      <td mat-cell *matCellDef="let r" class="centrado">{{ r.sec }}</td>
    </ng-container>

    <ng-container matColumnDef="correlativo">
      <th mat-header-cell *matHeaderCellDef class="centradoCabecera">Correlativo</th>
      <td mat-cell *matCellDef="let r" class="centrado">{{ r.correlativo }}</td>
    </ng-container>

    <!-- COLOR -->
    <ng-container matColumnDef="descripcion_Color">
      <th mat-header-cell *matHeaderCellDef class="centradoCabecera">Color</th>
      <td mat-cell *matCellDef="let r">{{ r.descripcion_Color }}</td>
    </ng-container>

    <!-- TELA -->
    <ng-container matColumnDef="tela">
      <th mat-header-cell *matHeaderCellDef class="centradoCabecera">Tela</th>
      <td mat-cell *matCellDef="let r" class="centrado">{{ r.tela ?? '' }}</td>
    </ng-container>

    <!-- Descripcion Jabonado -->
    <ng-container matColumnDef="jab_Des">
      <th mat-header-cell *matHeaderCellDef class="centradoCabecera">Curva</th>
      <td mat-cell *matCellDef="let r" class="centrado">{{ r.jab_Des ?? '' }}</td>
    </ng-container>

    <!-- Cantidad Jabonados -->
    <ng-container matColumnDef="can_Jabo">
      <th mat-header-cell *matHeaderCellDef class="centradoCabecera">Can. Jabonados</th>
      <td mat-cell *matCellDef="let r" class="centrado">{{ r.can_Jabo ?? '' }}</td>
    </ng-container>

    <!-- PH JABONADO -->
    <ng-container matColumnDef="ph_Jab">
        <th mat-header-cell *matHeaderCellDef class="centradoCabecera">PH JABONADO</th>
        <td mat-cell *matCellDef="let r" class="centrado">
        <a mat-button *ngIf="r.ph_Jab == 0" (click)="ingresarPH(r)" class="Boton">AGREGAR</a>
        <a mat-button *ngIf="r.ph_Jab != 0" (click)="ingresarPH(r)" class="Boton">{{ r.ph_Jab }}</a> 
        </td>
    </ng-container>

    <!-- Renderizado -->
    <tr mat-header-row *matHeaderRowDef="columnsToDisplay"></tr>
    <tr mat-row *matRowDef="let row; columns: columnsToDisplay;"></tr>
</table>
<div *ngIf="dataSource.data.length === 0" class="mensaje-vacio">
    No hay items disponibles.
</div>
</div>
