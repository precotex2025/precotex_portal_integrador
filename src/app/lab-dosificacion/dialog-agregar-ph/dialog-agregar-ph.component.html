<div class="ph-formulario">
<h2>Ingresar {{ data.Title }}</h2>

<mat-form-field appearance="outline" class="campo-ph">
    <mat-label>{{data.Title}}</mat-label>
    <input matInput type="text" inputmode="decimal" pattern="[0-9]*" [(ngModel)]="ValorPH" placeholder="Ingrese {{data.Title}}" />
    <mat-error *ngIf="!ValorPH.trim()">Debe ingresar un valor</mat-error>
</mat-form-field>

<div class="acciones">
    <button mat-raised-button color="primary" (click)="onAgregarPh()">Guardar</button>
    <button mat-raised-button color="warn" mat-dialog-close>Cerrar</button>
</div>
</div>

<ngx-spinner bdColor="rgba(51, 51, 51, 0.8)" size="medium" type="custom" [fullScreen]="true">
<div class="spinner-wrapper">
    <p class="spinner-text">ENVIANDO INFORMACIÓN</p>
    <div class="loader"></div>
</div>
</ngx-spinner>
